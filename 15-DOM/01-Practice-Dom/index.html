<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1 id="main-heading">DOM Practice Page</h1>
        <p class="description">Practice selecting and manipulating elements</p>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#" id="home-link">Home</a></li>
            <li><a href="#" id="about-link">About</a></li>
            <li><a href="#" id="contact-link">Contact</a></li>
        </ul>
    </nav>

    <!-- Home Section -->
    <section id="home-section">
        <h2>Home</h2>
        <p id="home-text">This is the home section.</p>

        <button id="change-text-btn">Change Text</button>
        <button id="change-color-btn">Change Color</button>

        <div id="box">Box Element</div>
    </section>

    <!-- About Section -->
    <section id="about-section">
        <h2>About</h2>
        <p>This section contains a list.</p>

        <ul id="item-list">
            <li class="item">Item 1</li>
            <li class="item">Item 2</li>
            <li class="item">Item 3</li>
        </ul>

        <button id="add-item-btn">Add Item</button>
        <button id="remove-item-btn">Remove Item</button>
    </section>

    <!-- Contact Section -->
    <section id="contact-section">
        <h2>Contact</h2>

        <form id="contact-form">
            <label>Name:</label>
            <input type="text" id="name-input">

            <br><br>

            <label>Email:</label>
            <input type="email" id="email-input">

            <br><br>

            <button type="submit" id="submit-btn">Submit</button>
        </form>

        <p id="output-message"></p>
    </section>

    <!-- Footer -->
    <footer>
        <p id="footer-text">Footer Content</p>
    </footer>

    <script src="./app.js"></script>
</body>
</html>
